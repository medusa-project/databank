item1:
  id: 1
  section_id: 1
  anchor: "login"
  label: "Log In"
  ordinal: 1
  heading: "Log in with NetID"
  body: "<p> The first step to depositing data within the Illinois Data Bank is logging in with your Illinois NetID and Active Directory password. The Illinois Data Bank will check your NetID and confirm that you belong to a group eligible for self-deposit. Illinois faculty, graduate students, and most staff are eligible for self-deposit, but others (including undergraduates) will see a restriction notice after logging in. </p>\r\n<p><a class='intense' href='https://databank.illinois.edu/contact'><span style=\"color: #dd3403;\">&#x2709; Contact the Research Data Service staff</a></span> if you run into trouble or need to request authorization for self-deposit. </p>"
  public: true
  created_at: "2022-07-25 15:29:21.583373000 +0000"
  updated_at: "2024-10-21 15:25:47.894254000 +0000"
item2:
  id: 2
  section_id: 1
  anchor: "describe"
  label: "Describe Your Dataset"
  ordinal: 2
  heading: "Describe Your Dataset"
  body: "<p> The information you provide here will be attached to your dataset as metadata associated with your <a class='intense' href='help#doi'>DOI</a>. Providing detailed descriptive information is important because it will be transmitted to search engines such as Google Scholar and other aggregators that look at data. The clearer you can describe your data, the easier it will be for others to find and make use of it! </p> <p>You can always edit and expand your metadata after publication. Research Data Service staff also regularly review the metadata and add information to increase the visibility of your dataset. Sections to add information about your dataset:</p> <ol><li> <p><b><em>Title:</em></b> provides descriptive title to reflect the dataset. <b>Tip:</b> common used format: Data for [insert article title].<br /><br /><img src=\"/dataset_title.png\"/> </p>  </li><li> <p><b><em>Description:</em></b> allows you to provide brief information about the dataset you are publishing, including information about the data files and their contents. You may choose to repeat a portion of your main documentation file here as well. <b>Tip:</b> information in this section should describe your dataset, not summarize the associated paper. <br /><br /><img src=\"/dataset_description.png\"/> </p> </li> <li> <p><b><em>Keywords:</em></b> enhances dataset searchability. <b>Tip:</b> use semicolon (;) to separate the list of keywords and add any words from the title that would be searchable in the keywords list.<br /><br /><img src=\"/dataset_keywords.png\"/> </p> </li> <li> <p><b><em>Funder:</em></b> allows you to provide grant or other information about financial support of your dataset. <br /><br /><img src=\"/dataset_funder.png\"/> </p> </li> <li> <p><b><em>Related Materials:</em></b> is where you can provide information about scholarly works that use or have contributed to your dataset. Research Data Service staff review this section and create links between these works and your dataset record. This allows publishers and <a href='http://altmetrics.org/tools/' target='_blank'>altmetrics tools</a> to make connections to your published data. <br /><br /><img src=\"/dataset_relatedmaterial.png\"/> </p> </li> </ol>"
  public: true
  created_at: "2022-07-25 15:29:21.588154000 +0000"
  updated_at: "2024-04-04 14:53:42.185023000 +0000"
item3:
  id: 3
  section_id: 1
  anchor: "upload"
  label: "Upload Files"
  ordinal: 3
  heading: "Upload Files"
  body: "<p>You may either upload directly from your computer or import files you already have stored inside of Box. Depending on your file size, there are several options for uploading your individual data files: <br/><br /> <img class=\"image-responsive\" src=\"/file_upload.png\"/></p>\r\n<p>You may save and exit your draft at any time. Let us know if we can help you get your data prepared and documented.\r\n<p><b>*NOTE:</b> Unlike the metadata, you <b>will not be allowed to edit or change your data files after publication</b> without curator assistance. <a class='intense' href='https://databank.illinois.edu/contact'><span style=\"color: #dd3403;\">&#x2709; Contact the Research Data Service staff</a></span> if you need assistance during uploading phase.</p>"
  public: true,
  created_at: "2022-07-25 15:29:21.591485000 +0000"
  updated_at: "2024-04-04 14:56:26.991999000 +0000"
item4:
  id: 4
  section_id: 3
  anchor: "doi"
  label: "What is a DOI?"
  ordinal: 5
  heading: "What is a DOI?"
  body: "<p>A <a class='intense' href=\"https://emails.illinois.edu/newsletter/163601.html\" style=\"text-decoration:none;\" target=\"_blank\"><span style=\"color: #dd3403;\">DOI</a></span>, or digital object identifier, is a unique ID assigned to digital resources on the web and used to identify digital resources on the Web over long periods of time. DOIs also promote resource discovery through the publication of descriptive information about the associated online resources. </p> <p><strong>Access:</strong> DOIs have associated redirect links, usually a page pointing to where the resource can be accessed. Any changes to where the resource is located on the web can be sent to the DOI resolution database and the DOI will automatically begin forwarding to that new page. This means that you are free to use this DOI link within static publications without fear that a resource migration or other URL change may break the link.</p> <p><strong>Discovery: </strong>DataCite, the resolution service that the Illinois Data Bank uses for minting DOIs, also accepts descriptive information about the registered data objects. This metadata is indexed by several search engines and promotes the discovery of the resources for future users.</p> <p><strong>Reserve DOI vs. Active DOI:</strong> The two types of DOI we use. If you choose to have your data curated before publishing, a reserve DOI will be attached. This reserves the datasets unique DOI, remains the same throughout, but it is not activated yet. The reserved DOI can be included in your upcoming publication. Once the dataset is published, the DOI becomes resolved (activated).</p> <p>Publishing your dataset within the Illinois Data Bank grants you a DOI for your dataset so you can benefit from a stable URL, increased visibility, and more formalized citation practices. Research Data Service staff members review and edit your descriptive metadata to ensure accuracy and maximize visibility. Curators also add formal links between associated publications so that aggregation and altmetrics services can recognize and include datasets within their reports.</p> <p>There are two types of DOI's we use: reserve DOI and active DOI. If you choose to do have your data curated before publishing, a reserve DOI will be attached. This reserves the datasets unique DOI, but it is not activated yet for sharing. Once the dataset is published, the DOI becomes actived and is ready for sharing.</p> <p>Questions or concerns about how DOIs work? <a class='intense' href='https://databank.illinois.edu/contact'><span style=\"color: #dd3403;\">&#x2709; Contact the Research Data Service staff</a></span>.</p>"
  public: true,
  created_at: "2022-07-25 15:29:21.653948000 +0000"
  updated_at: "2024-12-13 21:04:41.595588000 +0000"
item5:
  id: 5
  section_id: 3
  anchor: "data_availability"
  label: "What is data availability?"
  ordinal: 8
  heading: "How to write a data availability statement"
  body: "<p>Data availability statements are short, simple explanations of how a dataset referenced in a publication is available to others. \r\nWhen producing a statement for a dataset deposited in the Illinois Data Bank, reference the following:</p>\r\n\"The dataset supporting these findings is openly available in the Illinois Data Bank at [DOI received].\"</p>"
  public: true
  created_at: "2023-11-09 20:16:48.598352000 +0000"
  updated_at: "2024-12-13 21:04:41.598774000 +0000"
item6:
  id: 6
  section_id: 3
  anchor: "related materials"
  label: "Related Materials vs. Cited By"
  ordinal: 12
  heading: "Related Materials vs. Cited By"
  body: "<p>Articles, theses, code, etc. are items often related to a published dataset. We call these items \"Related Materials\" which provide context about the research project and methodology used to create, clean, or analyze the data. Related materials are produced by the same or very similar set of individuals who published the dataset. </p><p>“Cited By” indicates publications that have referenced the original dataset.</p>"
  public: true
  created_at: "2024-04-09 23:27:33.132407000 +0000"
  updated_at: "2024-12-13 21:04:41.604627000 +0000"
