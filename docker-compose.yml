#
# Example invocation: docker-compose up --exit-code-from ideals
#
version: '3'
services:
  cantaloupe:
    hostname: cantaloupe
    build:
      context: .
      dockerfile: ./docker/Dockerfile-cantaloupe
  databank:
    build:
      context: .
      dockerfile: ./docker/Dockerfile-databank
    command: bash -c "sleep 20 && bin/rails db:prepare && bin/rails \"elasticsearch:indexes:create[ideals_test]\""
  mockdusa:
    hostname: mockdusa
    image: 721945215539.dkr.ecr.us-east-2.amazonaws.com/mockdusa:latest
    environment:
      REPOSITORY_ROOT: /repo
    volumes:
      - type: bind
        source: ./docker/mockdusa/content
        target: /repo
        read_only: true
  postgres:
    image: postgres:12-alpine
    environment:
      POSTGRES_DB: databank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    hostname: postgres
  rabbitmq:
    build:
      context: .
      dockerfile: ./docker/Dockerfile-rabbitmq
    hostname: rabbitmq
  solr:
    build:
      context .
    dockerfile: ./docker/Dockerfile-solr
    hostname: solr
    command: ENV=test && curl "http://localhost:8983/solr/admin/cores?action=CREATE&name=$ENV&instanceDir=$ENV"
